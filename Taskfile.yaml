version: '3'

vars:
  BINARY_NAME: sandbox-agent
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  LDFLAGS: >-
    -X github.com/stacklok/sandbox-agent/internal/version.Version={{.VERSION}}
    -X github.com/stacklok/sandbox-agent/internal/version.Commit={{.COMMIT}}

# Quick reference:
#   task build         → Build sandbox-agent (pure Go, no CGO)
#   task build-dev     → Build sandbox-agent + propolis-runner
#   task test          → Run tests with race detector
#   task lint          → Run linter
#   task verify        → fmt + lint + test

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build sandbox-agent binary (pure Go, no CGO)
    env:
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY_NAME}} ./cmd/sandbox-agent
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - bin/{{.BINARY_NAME}}

  build-dev:
    desc: Build sandbox-agent + propolis-runner (requires libkrun-devel)
    platforms: [linux]
    cmds:
      - task: build
      - mkdir -p bin
      - cd ../propolis && CGO_ENABLED=1 go build -o ../sandbox-agent/bin/propolis-runner ./runner/cmd/propolis-runner

  test:
    desc: Run unit tests
    cmds:
      - go test -v -race ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  lint-fix:
    desc: Run linter and fix issues
    cmds:
      - golangci-lint run --fix ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...
      - goimports -w .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  verify:
    desc: Verify code (fmt, lint, test)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  run:
    desc: Build and run sandbox-agent
    cmds:
      - task: build
      - bin/{{.BINARY_NAME}} {{.CLI_ARGS}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html

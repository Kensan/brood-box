version: '3'

vars:
  BINARY_NAME: bbox
  IMAGE_REGISTRY: ghcr.io/stacklok/brood-box
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  PROPOLIS_VERSION:
    sh: go list -m github.com/stacklok/propolis | awk '{print $2}'
  HOST_ARCH:
    sh: uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/'
  HOST_OS:
    sh: uname -s | tr '[:upper:]' '[:lower:]'
  LDFLAGS: >-
    -X github.com/stacklok/brood-box/internal/version.Version={{.VERSION}}
    -X github.com/stacklok/brood-box/internal/version.Commit={{.COMMIT}}
  LDFLAGS_EMBED: >-
    -X github.com/stacklok/brood-box/internal/version.Version={{.VERSION}}
    -X github.com/stacklok/brood-box/internal/version.Commit={{.COMMIT}}
    -X github.com/stacklok/brood-box/internal/infra/vm/runtimebin.Version={{.PROPOLIS_VERSION}}

# Quick reference:
#   task build           → Build bbox (pure Go, no CGO)
#   task build-dev       → Build self-contained bbox with embedded propolis runtime
#   task fetch-runtime   → Download pre-built propolis runtime from GitHub Release
#   task fetch-firmware  → Download pre-built propolis firmware from GitHub Release
#   task test            → Run tests with race detector
#   task lint            → Run linter
#   task verify          → fmt + lint + test
#   task image-all       → Build all OCI guest images
#   task image-push      → Push all images to GHCR

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build-init:
    desc: Cross-compile bbox-init binary for guest VM
    # GOARCH inherits from host — KVM guests always match host architecture.
    # Override with GOARCH=<arch> task build-init if cross-compiling.
    env:
      CGO_ENABLED: "0"
      GOOS: linux
    cmds:
      - mkdir -p internal/infra/vm/initbin
      - go build -ldflags "-s -w" -o internal/infra/vm/initbin/bbox-init ./cmd/bbox-init
    sources:
      - cmd/bbox-init/**/*.go
      - internal/guest/**/*.go
    generates:
      - internal/infra/vm/initbin/bbox-init

  build:
    desc: Build bbox binary (pure Go, no CGO)
    deps: [build-init]
    env:
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY_NAME}} ./cmd/bbox
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - bin/{{.BINARY_NAME}}

  build-dev:
    desc: Build self-contained bbox with embedded propolis runtime
    platforms: [linux]
    deps: [build-init, fetch-runtime, fetch-firmware]
    env:
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p bin
      - go build -tags embed_runtime -ldflags "{{.LDFLAGS_EMBED}}" -o bin/{{.BINARY_NAME}} ./cmd/bbox

  build-dev-darwin:
    desc: Build self-contained bbox with embedded propolis runtime (macOS)
    platforms: [darwin]
    deps: [build-init, fetch-runtime, fetch-firmware]
    env:
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p bin
      - go build -tags embed_runtime -ldflags "{{.LDFLAGS_EMBED}}" -o bin/{{.BINARY_NAME}} ./cmd/bbox

  build-dev-system:
    desc: Build bbox + propolis-runner from system libkrun (requires libkrun-devel)
    platforms: [linux]
    cmds:
      - task: build
      - mkdir -p bin
      - CGO_ENABLED=1 go build -o bin/propolis-runner github.com/stacklok/propolis/runner/cmd/propolis-runner

  build-dev-system-darwin:
    desc: Build bbox + propolis-runner from system libkrun (macOS, requires Homebrew libkrun)
    platforms: [darwin]
    cmds:
      - task: build
      - mkdir -p bin
      - CGO_ENABLED=1 go build -o bin/propolis-runner github.com/stacklok/propolis/runner/cmd/propolis-runner
      - codesign --entitlements assets/entitlements.plist --force -s - bin/propolis-runner

  fetch-runtime:
    desc: Download pre-built propolis runtime from GitHub Release
    status:
      - test -f internal/infra/vm/runtimebin/propolis-runner
    cmds:
      - mkdir -p internal/infra/vm/runtimebin
      - >-
        gh release download {{.PROPOLIS_VERSION}}
        --repo stacklok/propolis
        --pattern "propolis-runtime-{{.HOST_OS}}-{{.HOST_ARCH}}.tar.gz"
        --dir internal/infra/vm/runtimebin/ --clobber
      - >-
        tar -xzf internal/infra/vm/runtimebin/propolis-runtime-{{.HOST_OS}}-{{.HOST_ARCH}}.tar.gz
        -C internal/infra/vm/runtimebin/ --strip-components=1
      - rm -f internal/infra/vm/runtimebin/propolis-runtime-{{.HOST_OS}}-{{.HOST_ARCH}}.tar.gz

  fetch-firmware:
    desc: Download pre-built propolis firmware from GitHub Release
    status:
      - test -f internal/infra/vm/runtimebin/libkrunfw.*
    cmds:
      - mkdir -p internal/infra/vm/runtimebin
      - >-
        gh release download {{.PROPOLIS_VERSION}}
        --repo stacklok/propolis
        --pattern "propolis-firmware-{{.HOST_OS}}-{{.HOST_ARCH}}.tar.gz"
        --dir internal/infra/vm/runtimebin/ --clobber
      - >-
        tar -xzf internal/infra/vm/runtimebin/propolis-firmware-{{.HOST_OS}}-{{.HOST_ARCH}}.tar.gz
        -C internal/infra/vm/runtimebin/ --strip-components=1
      - rm -f internal/infra/vm/runtimebin/propolis-firmware-{{.HOST_OS}}-{{.HOST_ARCH}}.tar.gz

  test:
    desc: Run unit tests
    cmds:
      - go test -v -race ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run --allow-parallel-runners ./...

  lint-fix:
    desc: Run linter and fix issues
    cmds:
      - golangci-lint run --allow-parallel-runners --fix ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...
      - goimports -w .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  verify:
    desc: Verify code (fmt, lint, test)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  run:
    desc: Build and run bbox
    cmds:
      - task: build
      - bin/{{.BINARY_NAME}} {{.CLI_ARGS}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
      - rm -f internal/infra/vm/initbin/bbox-init
      - rm -f internal/infra/vm/runtimebin/propolis-runner
      - rm -f internal/infra/vm/runtimebin/libkrun.so.1 internal/infra/vm/runtimebin/libkrun.dylib
      - rm -f internal/infra/vm/runtimebin/libkrunfw.so.5 internal/infra/vm/runtimebin/libkrunfw.dylib
      - rm -f internal/infra/vm/runtimebin/VERSION internal/infra/vm/runtimebin/LICENSE-GPL

  # --- OCI guest images ---

  image-base:
    desc: Build base guest image
    run: once
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/base:latest images/base/

  # --- Flavour base images ---

  image-base-go:
    desc: Build Go flavour base image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/base-go:latest images/flavours/go/

  image-base-python:
    desc: Build Python flavour base image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/base-python:latest images/flavours/python/

  image-base-node:
    desc: Build Node.js flavour base image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/base-node:latest images/flavours/node/

  image-base-rust:
    desc: Build Rust flavour base image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/base-rust:latest images/flavours/rust/

  image-flavour-bases:
    desc: Build all flavour base images
    deps: [image-base-go, image-base-python, image-base-node, image-base-rust]

  # --- Agent images (bare) ---

  image-claude-code:
    desc: Build claude-code guest image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/claude-code:latest images/claude-code/

  image-codex:
    desc: Build codex guest image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/codex:latest images/codex/

  image-opencode:
    desc: Build opencode guest image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/opencode:latest images/opencode/

  # --- Flavoured agent images ---
  # Each builds on a flavoured base image (e.g., base-go → claude-code-go).

  image-claude-code-go:
    desc: Build claude-code Go flavour image
    deps: [image-base-go]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-go:latest
        -t {{.IMAGE_REGISTRY}}/claude-code-go:latest images/claude-code/

  image-claude-code-python:
    desc: Build claude-code Python flavour image
    deps: [image-base-python]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-python:latest
        -t {{.IMAGE_REGISTRY}}/claude-code-python:latest images/claude-code/

  image-claude-code-node:
    desc: Build claude-code Node.js flavour image
    deps: [image-base-node]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-node:latest
        -t {{.IMAGE_REGISTRY}}/claude-code-node:latest images/claude-code/

  image-claude-code-rust:
    desc: Build claude-code Rust flavour image
    deps: [image-base-rust]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-rust:latest
        -t {{.IMAGE_REGISTRY}}/claude-code-rust:latest images/claude-code/

  image-codex-go:
    desc: Build codex Go flavour image
    deps: [image-base-go]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-go:latest
        -t {{.IMAGE_REGISTRY}}/codex-go:latest images/codex/

  image-codex-python:
    desc: Build codex Python flavour image
    deps: [image-base-python]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-python:latest
        -t {{.IMAGE_REGISTRY}}/codex-python:latest images/codex/

  image-codex-node:
    desc: Build codex Node.js flavour image
    deps: [image-base-node]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-node:latest
        -t {{.IMAGE_REGISTRY}}/codex-node:latest images/codex/

  image-codex-rust:
    desc: Build codex Rust flavour image
    deps: [image-base-rust]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-rust:latest
        -t {{.IMAGE_REGISTRY}}/codex-rust:latest images/codex/

  image-opencode-go:
    desc: Build opencode Go flavour image
    deps: [image-base-go]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-go:latest
        -t {{.IMAGE_REGISTRY}}/opencode-go:latest images/opencode/

  image-opencode-python:
    desc: Build opencode Python flavour image
    deps: [image-base-python]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-python:latest
        -t {{.IMAGE_REGISTRY}}/opencode-python:latest images/opencode/

  image-opencode-node:
    desc: Build opencode Node.js flavour image
    deps: [image-base-node]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-node:latest
        -t {{.IMAGE_REGISTRY}}/opencode-node:latest images/opencode/

  image-opencode-rust:
    desc: Build opencode Rust flavour image
    deps: [image-base-rust]
    cmds:
      - >-
        podman build
        --build-arg BASE_IMAGE={{.IMAGE_REGISTRY}}/base-rust:latest
        -t {{.IMAGE_REGISTRY}}/opencode-rust:latest images/opencode/

  image-flavours:
    desc: Build all flavoured agent images
    deps:
      - image-claude-code-go
      - image-claude-code-python
      - image-claude-code-node
      - image-claude-code-rust
      - image-codex-go
      - image-codex-python
      - image-codex-node
      - image-codex-rust
      - image-opencode-go
      - image-opencode-python
      - image-opencode-node
      - image-opencode-rust

  image-all:
    desc: Build all guest images (bare + flavoured)
    deps: [image-claude-code, image-codex, image-opencode, image-flavours]

  image-push:
    desc: Push all images to GHCR
    deps: [image-all]
    cmds:
      # Base images (base-go etc. are intermediate build artifacts, not pushed).
      - podman push {{.IMAGE_REGISTRY}}/base:latest
      # Bare agent images.
      - podman push {{.IMAGE_REGISTRY}}/claude-code:latest
      - podman push {{.IMAGE_REGISTRY}}/codex:latest
      - podman push {{.IMAGE_REGISTRY}}/opencode:latest
      # Flavoured agent images.
      - podman push {{.IMAGE_REGISTRY}}/claude-code-go:latest
      - podman push {{.IMAGE_REGISTRY}}/claude-code-python:latest
      - podman push {{.IMAGE_REGISTRY}}/claude-code-node:latest
      - podman push {{.IMAGE_REGISTRY}}/claude-code-rust:latest
      - podman push {{.IMAGE_REGISTRY}}/codex-go:latest
      - podman push {{.IMAGE_REGISTRY}}/codex-python:latest
      - podman push {{.IMAGE_REGISTRY}}/codex-node:latest
      - podman push {{.IMAGE_REGISTRY}}/codex-rust:latest
      - podman push {{.IMAGE_REGISTRY}}/opencode-go:latest
      - podman push {{.IMAGE_REGISTRY}}/opencode-python:latest
      - podman push {{.IMAGE_REGISTRY}}/opencode-node:latest
      - podman push {{.IMAGE_REGISTRY}}/opencode-rust:latest
